<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upwork Scraper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <div class="title-row">
        <span class="logo">&#x2B21;</span>
        <h1>Upwork Scraper</h1>
      </div>
      <div class="header-right">
        <span id="status" class="status inactive">&#x25CF; Inactive</span>
        <button id="btn-toggle" class="toggle-btn off">OFF</button>
      </div>
    </header>

    <!-- Top tabs -->
    <div class="top-tabs">
      <button class="top-tab active" data-panel="jobs">&#x1F4BC; Jobs</button>
      <button class="top-tab" data-panel="search">&#x1F50D; Search</button>
      <button class="top-tab" data-panel="config">&#x2699; Config</button>
    </div>

    <!-- JOBS PANEL -->
    <div id="panel-jobs">
      <div class="panel-toolbar">
        <button id="btn-run-scrape" class="primary">&#x25B6; Run Scrape</button>
        <button id="btn-jobs-refresh">&#x21BB; Refresh</button>
        <span id="scrape-status" class="toolbar-status"></span>
        <span style="flex:1"></span>
        <button id="btn-jobs-download" class="icon-btn" title="Download JSON" disabled>&#x2B07;</button>
        <button id="btn-jobs-clear" class="icon-btn danger" title="Clear all">&#x2715;</button>
      </div>
      <div id="jobs-list">
        <div class="empty">Browse a job on Upwork to auto-detect, or click &#x25B6; Run Scrape.</div>
      </div>
      <div id="job-drawer" class="job-drawer hidden">
        <div class="drawer-header">
          <span id="drawer-title">Job Details</span>
          <button id="drawer-close">&#x2715;</button>
        </div>
        <div class="drawer-tabs" id="drawer-tabs"></div>
        <div id="drawer-content" class="drawer-content"></div>
      </div>
    </div>

    <!-- SEARCH PANEL -->
    <div id="panel-search" class="hidden">
      <div class="panel-toolbar">
        <span id="search-count" class="toolbar-status">No results yet &#x2014; click &#x25B6; Run Scrape</span>
        <span style="flex:1"></span>
        <button id="btn-search-download" class="icon-btn" title="Download JSON" disabled>&#x2B07;</button>
        <button id="btn-search-clear" class="icon-btn danger" title="Clear results">&#x2715;</button>
      </div>
      <div id="search-grid" class="search-grid"></div>
      <div id="search-drawer" class="job-drawer hidden">
        <div class="drawer-header">
          <span id="search-drawer-title">Job Details</span>
          <button id="search-drawer-close">&#x2715;</button>
        </div>
        <div class="drawer-tabs" id="search-drawer-tabs"></div>
        <div id="search-drawer-content" class="drawer-content"></div>
      </div>
    </div>

    <!-- CONFIG PANEL -->
    <div id="panel-config" class="hidden">
      <div class="config-section">
        <div class="config-label">Session Tokens</div>
        <div id="cfg-token-status" class="config-token-grid">
          <span class="tok-badge" id="tok-search">&#x1F534; search</span>
          <span class="tok-badge" id="tok-job">&#x1F534; job</span>
          <span class="tok-badge" id="tok-global">&#x1F534; global</span>
          <span class="tok-badge" id="tok-tenant">&#x1F534; tenant</span>
          <span class="tok-badge" id="tok-xsrf">&#x1F534; xsrf</span>
          <span class="tok-badge" id="tok-agency">&#x1F534; agency</span>
        </div>
        <div class="config-hint">Browse any Upwork page to auto-populate tokens.</div>
      </div>
      <div id="cfg-log" class="config-log"></div>
    </div>

  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
