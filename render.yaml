services:
  - type: web
    name: upwork-scraper
    env: node
    buildCommand: |
      chmod +x install-chrome.sh
      ./install-chrome.sh || apt-get install -y chromium
      npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
